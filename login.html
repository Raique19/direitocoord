<!DOCTYPE html>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">

    <h1 class="text-2xl font-bold text-center mb-2">
      Coordenação Direito & RI
    </h1>

    <p class="text-center text-slate-500 mb-6">
      Painel de Atendimentos
    </p>

    <form id="login-form" class="space-y-4">

      <div>
        <label class="block mb-1 text-sm font-medium">Email</label>
        <input
          type="email"
          id="email"
          class="w-full border rounded-lg p-3"
          required
        >
      </div>

      <div>
        <label class="block mb-1 text-sm font-medium">Senha</label>
        <input
          type="password"
          id="password"
          class="w-full border rounded-lg p-3"
          required
        >
      </div>

      <button
        type="submit"
        class="w-full bg-slate-800 text-white p-3 rounded-lg hover:bg-slate-700 transition"
      >
        Entrar
      </button>

    </form>

    <p id="error-message" class="text-red-500 text-sm mt-4 text-center"></p>

  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
